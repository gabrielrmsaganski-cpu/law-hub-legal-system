  <circle cx="128" cy="96" r="8" fill="#f3d27a" />
  <path d="M72 160h112" stroke="#f3d27a" stroke-opacity=".45" stroke-width="2" stroke-linecap="round" />
  <text x="128" y="188" text-anchor="middle" fill="#f8f4ea" font-size="44" font-weight="700" letter-spacing="10">LAW</text>
